<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>DIP — Team Access</title>
  <link rel="icon" type="image/png" href="app_icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Quicksand', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(150deg, #8ED6DC 0%, #5ab8c8 35%, #3a6aa0 65%, #2E3A78 100%);
      padding: 24px;
    }
    .card {
      background: rgba(13, 18, 48, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .card img { height: 44px; border-radius: 10px; margin-bottom: 18px; }
    .card h1 { color: #fff; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .card p { color: rgba(255,255,255,0.6); font-size: 14px; line-height: 1.6; margin-bottom: 28px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      background: #E93E8F; color: #fff;
      padding: 14px 24px; border-radius: 50px;
      font-family: inherit; font-size: 15px; font-weight: 700;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <img src="app_icon.png" alt="DIP" />
    <h1>Team Access</h1>
    <p>Continue to the admin/moderator portal. Sign-in is required beyond this point.</p>
    <a class="btn" href="https://dip-app-16528.web.app/portal/">Continue to Portal →</a>
  </div>
</body>
</html>
